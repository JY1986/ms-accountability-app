<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#1a56a8"/>
    </linearGradient>
  </defs>

  <!-- Full bleed background (no rounded corners for maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- All content kept within safe zone: inner 80% (x=52–460, y=52–460) -->

  <!-- Finial cross -->
  <rect x="252" y="80" width="8" height="28" fill="white" rx="2"/>
  <rect x="243" y="88" width="26" height="8" fill="white" rx="2"/>

  <!-- Dome -->
  <path d="M 192 192 C 192 124 220 102 256 102 C 292 102 320 124 320 192 Z" fill="white"/>

  <!-- Drum -->
  <rect x="192" y="188" width="128" height="18" fill="white"/>

  <!-- Column capitals -->
  <rect x="192" y="202" width="128" height="10" fill="white"/>

  <!-- Three columns -->
  <rect x="201" y="212" width="16" height="90" fill="white" rx="3"/>
  <rect x="248" y="212" width="16" height="90" fill="white" rx="3"/>
  <rect x="295" y="212" width="16" height="90" fill="white" rx="3"/>

  <!-- Column bases -->
  <rect x="192" y="298" width="128" height="10" fill="white"/>

  <!-- Stylobate steps -->
  <rect x="182" y="308" width="148" height="12" fill="white" rx="2"/>
  <rect x="172" y="318" width="168" height="11" fill="white" rx="2"/>

  <!-- "School Leaders" text -->
  <text x="256" y="378"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-weight="900" font-size="48" fill="white" text-anchor="middle">School Leaders</text>

  <!-- "THINK TANK" text -->
  <text x="256" y="422"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-weight="700" font-size="32" fill="rgba(255,255,255,0.75)" text-anchor="middle"
    letter-spacing="6">THINK TANK</text>
</svg>
